name: Chart CI

on:
  push:
    branches: [main]
    paths:
      - "chart/**"
      - "Makefile"
      - ".github/workflows/chart-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "chart/**"
      - "Makefile"
      - ".github/workflows/chart-ci.yaml"
  workflow_dispatch:

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart (strict)
        run: make helm-lint

      - name: Validate template rendering
        run: make helm-template

      - name: Validate schema rejects invalid values
        run: make helm-schema

  helm-docs:
    name: Helm Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache helm-docs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin/helm-docs
          key: helm-docs-${{ runner.os }}-v1.14.2

      - name: Install helm-docs
        run: |
          if ! command -v helm-docs &>/dev/null; then
            go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
          fi

      - name: Check chart/README.md is up to date
        run: make helm-docs-check
